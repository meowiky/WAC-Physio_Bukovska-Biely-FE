openapi: 3.0.0
info:
  contact:
    email: xbukovska@stuba.sk
  description: Physio rehabilitation management API for Web-In-Cloud system
  license:
    name: CC BY 4.0
    url: https://creativecommons.org/licenses/by/4.0/
  title: Physio API
  version: 1.0.0
servers:
- description: Cluster Endpoint
  url: /api
tags:
- description: Patient registry managed by receptionist or physiotherapist
  name: patients
- description: Doctors and physiotherapists who can lead rehabilitation sessions
  name: therapists
- description: Ambulances and rooms where rehabilitation sessions take place
  name: ambulances
- description: Rehabilitation plans assigned to one patient
  name: rehabilitationPlans
- description: Sessions belonging to a rehabilitation plan
  name: rehabilitationSessions
- description: Availability checks for ambulances and therapists
  name: availability
paths:
  /patients:
    get:
      description: Returns registered patients.
      operationId: getPatients
      responses:
        "200":
          content:
            application/json:
              examples:
                response:
                  $ref: "#/components/examples/PatientsExample"
              schema:
                items:
                  $ref: "#/components/schemas/Patient"
                type: array
          description: List of patients
      summary: List patients
      tags:
      - patients
    post:
      description: Creates a new patient.
      operationId: createPatient
      requestBody:
        content:
          application/json:
            examples:
              request:
                $ref: "#/components/examples/PatientExample"
            schema:
              $ref: "#/components/schemas/Patient"
        description: Patient data to store
        required: true
      responses:
        "201":
          content:
            application/json:
              examples:
                response:
                  $ref: "#/components/examples/PatientExample"
              schema:
                $ref: "#/components/schemas/Patient"
          description: Stored patient
        "400":
          description: Missing mandatory properties or invalid values in the request
            body.
        "409":
          description: Patient with the specified id or birth number already exists
      summary: Create patient
      tags:
      - patients
  /patients/{patientId}:
    delete:
      description: Deletes a patient.
      operationId: deletePatient
      parameters:
      - description: Unique identifier of the patient
        explode: false
        in: path
        name: patientId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Patient deleted
        "404":
          description: Requested resource does not exist.
        "409":
          description: Patient cannot be deleted because related rehabilitation plans
            still exist
      summary: Delete patient
      tags:
      - patients
    get:
      description: Returns one patient.
      operationId: getPatient
      parameters:
      - description: Unique identifier of the patient
        explode: false
        in: path
        name: patientId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              examples:
                response:
                  $ref: "#/components/examples/PatientExample"
              schema:
                $ref: "#/components/schemas/Patient"
          description: Patient detail
        "404":
          description: Requested resource does not exist.
      summary: Get patient detail
      tags:
      - patients
    put:
      description: Updates an existing patient.
      operationId: updatePatient
      parameters:
      - description: Unique identifier of the patient
        explode: false
        in: path
        name: patientId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            examples:
              request:
                $ref: "#/components/examples/PatientExample"
            schema:
              $ref: "#/components/schemas/Patient"
        description: Patient data to update
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                response:
                  $ref: "#/components/examples/PatientExample"
              schema:
                $ref: "#/components/schemas/Patient"
          description: Updated patient
        "400":
          description: Missing mandatory properties or invalid values in the request
            body.
        "403":
          description: Identifier in path does not match identifier in the request
            body.
        "404":
          description: Requested resource does not exist.
      summary: Update patient
      tags:
      - patients
  /therapists:
    get:
      description: Returns physiotherapists.
      operationId: getTherapists
      responses:
        "200":
          content:
            application/json:
              examples:
                response:
                  $ref: "#/components/examples/TherapistsExample"
              schema:
                items:
                  $ref: "#/components/schemas/Therapist"
                type: array
          description: List of therapists
      summary: List therapists
      tags:
      - therapists
    post:
      description: Creates a therapist record.
      operationId: createTherapist
      requestBody:
        content:
          application/json:
            examples:
              request:
                $ref: "#/components/examples/TherapistExample"
            schema:
              $ref: "#/components/schemas/Therapist"
        description: Therapist data to store
        required: true
      responses:
        "201":
          content:
            application/json:
              examples:
                response:
                  $ref: "#/components/examples/TherapistExample"
              schema:
                $ref: "#/components/schemas/Therapist"
          description: Stored therapist
        "400":
          description: Missing mandatory properties or invalid values in the request
            body.
        "409":
          description: Therapist with the specified id already exists
      summary: Create therapist
      tags:
      - therapists
  /therapists/{therapistId}:
    delete:
      description: Deletes a therapist.
      operationId: deleteTherapist
      parameters:
      - description: Unique identifier of the therapist
        explode: false
        in: path
        name: therapistId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Therapist deleted
        "404":
          description: Requested resource does not exist.
        "409":
          description: Therapist cannot be deleted because related rehabilitation
            sessions still exist
      summary: Delete therapist
      tags:
      - therapists
    get:
      description: Returns one therapist.
      operationId: getTherapist
      parameters:
      - description: Unique identifier of the therapist
        explode: false
        in: path
        name: therapistId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              examples:
                response:
                  $ref: "#/components/examples/TherapistExample"
              schema:
                $ref: "#/components/schemas/Therapist"
          description: Therapist detail
        "404":
          description: Requested resource does not exist.
      summary: Get therapist detail
      tags:
      - therapists
    put:
      description: Updates an existing therapist.
      operationId: updateTherapist
      parameters:
      - description: Unique identifier of the therapist
        explode: false
        in: path
        name: therapistId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            examples:
              request:
                $ref: "#/components/examples/TherapistExample"
            schema:
              $ref: "#/components/schemas/Therapist"
        description: Therapist data to update
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                response:
                  $ref: "#/components/examples/TherapistExample"
              schema:
                $ref: "#/components/schemas/Therapist"
          description: Updated therapist
        "400":
          description: Missing mandatory properties or invalid values in the request
            body.
        "403":
          description: Identifier in path does not match identifier in the request
            body.
        "404":
          description: Requested resource does not exist.
      summary: Update therapist
      tags:
      - therapists
  /ambulances:
    get:
      description: Returns ambulances and rehabilitation rooms.
      operationId: getAmbulances
      responses:
        "200":
          content:
            application/json:
              examples:
                response:
                  $ref: "#/components/examples/AmbulancesExample"
              schema:
                items:
                  $ref: "#/components/schemas/Ambulance"
                type: array
          description: List of ambulances
      summary: List ambulances
      tags:
      - ambulances
    post:
      description: Creates an ambulance or rehabilitation room record.
      operationId: createAmbulance
      requestBody:
        content:
          application/json:
            examples:
              request:
                $ref: "#/components/examples/AmbulanceExample"
            schema:
              $ref: "#/components/schemas/Ambulance"
        description: Ambulance data to store
        required: true
      responses:
        "201":
          content:
            application/json:
              examples:
                response:
                  $ref: "#/components/examples/AmbulanceExample"
              schema:
                $ref: "#/components/schemas/Ambulance"
          description: Stored ambulance
        "400":
          description: Missing mandatory properties or invalid values in the request
            body.
        "409":
          description: Ambulance with the specified id already exists
      summary: Create ambulance
      tags:
      - ambulances
  /ambulances/{ambulanceId}:
    delete:
      description: Deletes an ambulance or room.
      operationId: deleteAmbulance
      parameters:
      - description: Unique identifier of the ambulance
        explode: false
        in: path
        name: ambulanceId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Ambulance deleted
        "404":
          description: Requested resource does not exist.
        "409":
          description: Ambulance cannot be deleted because related rehabilitation
            sessions still exist
      summary: Delete ambulance
      tags:
      - ambulances
    get:
      description: Returns one ambulance or rehabilitation room.
      operationId: getAmbulance
      parameters:
      - description: Unique identifier of the ambulance
        explode: false
        in: path
        name: ambulanceId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              examples:
                response:
                  $ref: "#/components/examples/AmbulanceExample"
              schema:
                $ref: "#/components/schemas/Ambulance"
          description: Ambulance detail
        "404":
          description: Requested resource does not exist.
      summary: Get ambulance detail
      tags:
      - ambulances
    put:
      description: Updates an existing ambulance or room.
      operationId: updateAmbulance
      parameters:
      - description: Unique identifier of the ambulance
        explode: false
        in: path
        name: ambulanceId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            examples:
              request:
                $ref: "#/components/examples/AmbulanceExample"
            schema:
              $ref: "#/components/schemas/Ambulance"
        description: Ambulance data to update
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                response:
                  $ref: "#/components/examples/AmbulanceExample"
              schema:
                $ref: "#/components/schemas/Ambulance"
          description: Updated ambulance
        "400":
          description: Missing mandatory properties or invalid values in the request
            body.
        "403":
          description: Identifier in path does not match identifier in the request
            body.
        "404":
          description: Requested resource does not exist.
      summary: Update ambulance
      tags:
      - ambulances
  /rehabilitation-plans:
    get:
      description: Returns rehabilitation plans.
      operationId: getRehabilitationPlans
      parameters:
      - description: Optional patient filter.
        explode: true
        in: query
        name: patientId
        required: false
        schema:
          type: string
        style: form
      - description: Optional plan status filter.
        explode: true
        in: query
        name: status
        required: false
        schema:
          $ref: "#/components/schemas/RehabilitationPlanStatus"
        style: form
      responses:
        "200":
          content:
            application/json:
              examples:
                response:
                  $ref: "#/components/examples/RehabilitationPlansExample"
              schema:
                items:
                  $ref: "#/components/schemas/RehabilitationPlan"
                type: array
          description: List of rehabilitation plans
      summary: List rehabilitation plans
      tags:
      - rehabilitationPlans
    post:
      description: Creates a rehabilitation plan for one patient.
      operationId: createRehabilitationPlan
      requestBody:
        content:
          application/json:
            examples:
              request:
                $ref: "#/components/examples/RehabilitationPlanExample"
            schema:
              $ref: "#/components/schemas/RehabilitationPlan"
        description: Rehabilitation plan to store
        required: true
      responses:
        "201":
          content:
            application/json:
              examples:
                response:
                  $ref: "#/components/examples/RehabilitationPlanExample"
              schema:
                $ref: "#/components/schemas/RehabilitationPlan"
          description: Stored rehabilitation plan
        "400":
          description: Missing mandatory properties or invalid values in the request
            body.
        "404":
          description: Referenced patient does not exist
        "409":
          description: Plan with the specified id already exists
      summary: Create rehabilitation plan
      tags:
      - rehabilitationPlans
  /rehabilitation-plans/{planId}:
    delete:
      description: Deletes a rehabilitation plan.
      operationId: deleteRehabilitationPlan
      parameters:
      - description: Unique identifier of the rehabilitation plan
        explode: false
        in: path
        name: planId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Rehabilitation plan deleted
        "404":
          description: Requested resource does not exist.
        "409":
          description: Plan cannot be deleted because related sessions still exist
      summary: Delete rehabilitation plan
      tags:
      - rehabilitationPlans
    get:
      description: Returns one rehabilitation plan.
      operationId: getRehabilitationPlan
      parameters:
      - description: Unique identifier of the rehabilitation plan
        explode: false
        in: path
        name: planId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              examples:
                response:
                  $ref: "#/components/examples/RehabilitationPlanExample"
              schema:
                $ref: "#/components/schemas/RehabilitationPlan"
          description: Rehabilitation plan detail
        "404":
          description: Requested resource does not exist.
      summary: Get rehabilitation plan detail
      tags:
      - rehabilitationPlans
    put:
      description: Updates an existing rehabilitation plan.
      operationId: updateRehabilitationPlan
      parameters:
      - description: Unique identifier of the rehabilitation plan
        explode: false
        in: path
        name: planId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            examples:
              request:
                $ref: "#/components/examples/RehabilitationPlanExample"
            schema:
              $ref: "#/components/schemas/RehabilitationPlan"
        description: Rehabilitation plan data to update
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                response:
                  $ref: "#/components/examples/RehabilitationPlanExample"
              schema:
                $ref: "#/components/schemas/RehabilitationPlan"
          description: Updated rehabilitation plan
        "400":
          description: Missing mandatory properties or invalid values in the request
            body.
        "403":
          description: Identifier in path does not match identifier in the request
            body.
        "404":
          description: Requested resource does not exist.
      summary: Update rehabilitation plan
      tags:
      - rehabilitationPlans
  /rehabilitation-sessions:
    get:
      description: Returns rehabilitation sessions.
      operationId: getRehabilitationSessions
      parameters:
      - description: Optional rehabilitation plan filter.
        explode: true
        in: query
        name: planId
        required: false
        schema:
          type: string
        style: form
      - description: Optional therapist filter.
        explode: true
        in: query
        name: therapistId
        required: false
        schema:
          type: string
        style: form
      - description: Optional ambulance filter.
        explode: true
        in: query
        name: ambulanceId
        required: false
        schema:
          type: string
        style: form
      - description: Optional attendance status filter.
        explode: true
        in: query
        name: attendanceStatus
        required: false
        schema:
          $ref: "#/components/schemas/AttendanceStatus"
        style: form
      - description: Optional confirmation status filter.
        explode: true
        in: query
        name: confirmationStatus
        required: false
        schema:
          $ref: "#/components/schemas/SessionConfirmationStatus"
        style: form
      responses:
        "200":
          content:
            application/json:
              examples:
                response:
                  $ref: "#/components/examples/RehabilitationSessionsExample"
              schema:
                items:
                  $ref: "#/components/schemas/RehabilitationSession"
                type: array
          description: List of rehabilitation sessions
      summary: List rehabilitation sessions
      tags:
      - rehabilitationSessions
    post:
      description: Creates a session belonging to one rehabilitation plan.
      operationId: createRehabilitationSession
      requestBody:
        content:
          application/json:
            examples:
              request:
                $ref: "#/components/examples/RehabilitationSessionExample"
            schema:
              $ref: "#/components/schemas/RehabilitationSession"
        description: Session data to store
        required: true
      responses:
        "201":
          content:
            application/json:
              examples:
                response:
                  $ref: "#/components/examples/RehabilitationSessionExample"
              schema:
                $ref: "#/components/schemas/RehabilitationSession"
          description: Stored rehabilitation session
        "400":
          description: Missing mandatory properties or invalid values in the request
            body.
        "404":
          description: "Referenced rehabilitation plan, therapist or ambulance does\
            \ not exist"
        "409":
          description: Session with the specified id already exists or selected therapist
            or ambulance is not available
      summary: Create rehabilitation session
      tags:
      - rehabilitationSessions
  /rehabilitation-sessions/{sessionId}:
    delete:
      description: Deletes a rehabilitation session.
      operationId: deleteRehabilitationSession
      parameters:
      - description: Unique identifier of the rehabilitation session
        explode: false
        in: path
        name: sessionId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Rehabilitation session deleted
        "404":
          description: Requested resource does not exist.
      summary: Delete rehabilitation session
      tags:
      - rehabilitationSessions
    get:
      description: Returns one rehabilitation session.
      operationId: getRehabilitationSession
      parameters:
      - description: Unique identifier of the rehabilitation session
        explode: false
        in: path
        name: sessionId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              examples:
                response:
                  $ref: "#/components/examples/RehabilitationSessionExample"
              schema:
                $ref: "#/components/schemas/RehabilitationSession"
          description: Rehabilitation session detail
        "404":
          description: Requested resource does not exist.
      summary: Get rehabilitation session detail
      tags:
      - rehabilitationSessions
    put:
      description: Updates an existing rehabilitation session.
      operationId: updateRehabilitationSession
      parameters:
      - description: Unique identifier of the rehabilitation session
        explode: false
        in: path
        name: sessionId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            examples:
              request:
                $ref: "#/components/examples/RehabilitationSessionExample"
            schema:
              $ref: "#/components/schemas/RehabilitationSession"
        description: Session data to update
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                response:
                  $ref: "#/components/examples/RehabilitationSessionExample"
              schema:
                $ref: "#/components/schemas/RehabilitationSession"
          description: Updated rehabilitation session
        "400":
          description: Missing mandatory properties or invalid values in the request
            body.
        "403":
          description: Identifier in path does not match identifier in the request
            body.
        "404":
          description: Requested resource does not exist.
        "409":
          description: Selected therapist or ambulance is not available for the requested
            time interval
      summary: Update rehabilitation session
      tags:
      - rehabilitationSessions
  /availability:
    get:
      description: Checks whether the selected ambulance is free and whether the selected
        therapist has no overlapping session in the requested time interval.
      operationId: checkAvailability
      parameters:
      - description: Requested session start date and time.
        explode: true
        in: query
        name: startDateTime
        required: true
        schema:
          format: date-time
          type: string
        style: form
      - description: Requested session end date and time.
        explode: true
        in: query
        name: endDateTime
        required: true
        schema:
          format: date-time
          type: string
        style: form
      - description: Optional ambulance to check.
        explode: true
        in: query
        name: ambulanceId
        required: false
        schema:
          type: string
        style: form
      - description: Optional therapist to check.
        explode: true
        in: query
        name: therapistId
        required: false
        schema:
          type: string
        style: form
      - description: "Optional session id to ignore during overlap checks, useful\
          \ while editing an existing session."
        explode: true
        in: query
        name: excludeSessionId
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              examples:
                response:
                  $ref: "#/components/examples/AvailabilityResultExample"
              schema:
                $ref: "#/components/schemas/AvailabilityResult"
          description: Availability result for the requested interval
        "400":
          description: Missing mandatory properties or invalid values in the request
            body.
        "404":
          description: Specified therapist or ambulance does not exist
      summary: Check ambulance and therapist availability
      tags:
      - availability
